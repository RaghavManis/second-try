# Production Environment Configuration
# This file inherits base application.properties and overrides properties matching the '-prod' profile.

# Database Configuration (Bind to Environment Variables injected by Aiven/Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Render dynamically assigns a PORT environment variable
server.port=${PORT:8080}
server.address=0.0.0.0

# CORS Configuration (Allow frontend domain provided by Vercel)
cors.allowed-origins=${FRONTEND_URL}

# Security & Authentication (Environment variables from Render)
admin.username=${ADMIN_USERNAME:splcricket}
admin.password=${ADMIN_PASSWORD:splcricket.com}
